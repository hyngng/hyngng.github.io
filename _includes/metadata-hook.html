<!-- Identity Schema: Person + WebSite (JSON-LD) -->
<!-- Article/BlogPosting은 jekyll-seo-tag가 자동 생성하므로 여기서는 제외 -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Person",
      "@id": "{{ site.url }}/#person",
      "name": "{{ site.social.name }}",
      "url": "{{ site.url }}",
      "email": "{{ site.social.email }}",
      "image": "{{ site.url }}{{ site.avatar }}",
      "sameAs": [
        {% for link in site.social.links %}
          "{{ link }}"{% unless forloop.last %},{% endunless %}
        {% endfor %}
      ]
    },
    {
      "@type": "WebSite",
      "@id": "{{ site.url }}/#website",
      "name": "{{ site.title }}",
      "url": "{{ site.url }}",
      "description": "{{ site.description | xml_escape }}",
      "inLanguage": "{{ site.lang | default: 'ko-KR' }}",
      "publisher": {
        "@id": "{{ site.url }}/#person"
      }
    }
  ]
}
</script>
